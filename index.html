<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VIT Scan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 24px);
  }

  .page {
    width: 100%;
    max-width: 460px;
    padding: 1.75rem 1.5rem 3rem;
    min-height: 100vh;
  }

  .logo {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #bbb;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  /* ── Loading / No-tag states ── */
  .state-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 14px;
    text-align: center;
  }

  .state-icon { font-size: 52px; line-height: 1; }

  .state-title {
    font-size: 20px;
    font-weight: 700;
    color: #333;
    letter-spacing: -0.02em;
  }

  .state-sub { font-size: 14px; color: #999; line-height: 1.6; max-width: 280px; }

  .spinner-ring {
    width: 40px; height: 40px;
    border: 3px solid #e5e5e5;
    border-top-color: #999;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Main content fade-in ── */
  .main-content {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .main-content.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Manager dropdown ── */
  .field-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 6px;
    display: block;
  }

  select {
    width: 100%;
    padding: 0.85rem 1rem;
    border: 1.5px solid #e5e5e5;
    border-radius: 12px;
    font-size: 16px;
    background: #fff;
    color: #1a1a1a;
    appearance: none;
    -webkit-appearance: none;
    font-family: inherit;
    margin-bottom: 1.5rem;
    transition: border-color 0.15s;
  }

  select:focus { outline: none; border-color: #1a1a1a; }

  /* ── Worker card ── */
  .worker-card {
    background: #fff;
    border: 1.5px solid #e5e5e5;
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 1.25rem;
  }

  .worker-card-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1a1a;
    margin-bottom: 2px;
  }

  .worker-card-position {
    font-size: 13px;
    color: #888;
    margin-bottom: 14px;
  }

  .card-rows { display: flex; flex-direction: column; gap: 0; }

  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #f2f2f2;
    font-size: 13px;
  }

  .card-row:last-child { border-bottom: none; }
  .card-row .ck { color: #bbb; font-size: 12px; }
  .card-row .cv { font-weight: 600; color: #333; text-align: right; }

  /* ── Status pill ── */
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em;
  }

  .status-pill::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }

  .pill-in     { background: #dcfce7; color: #166534; }
  .pill-in::before     { background: #16a34a; animation: blink 1.8s infinite; }
  .pill-out    { background: #eff6ff; color: #1d4ed8; }
  .pill-out::before    { background: #3b82f6; }
  .pill-lunch  { background: #fef9c3; color: #854d0e; }
  .pill-lunch::before  { background: #ca8a04; animation: blink 1.8s infinite; }
  .pill-none   { background: #f4f4f5; color: #71717a; }
  .pill-none::before   { background: #a1a1aa; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Clock IN / OUT toggle ── */
  .clock-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .clock-btn {
    padding: 0.9rem 1rem;
    border: 1.5px solid #e5e5e5;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    background: #fff;
    color: #aaa;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    letter-spacing: -0.01em;
  }

  .clock-btn:active { transform: scale(0.97); }

  .clock-btn.active-in {
    background: #166534;
    border-color: #166534;
    color: #fff;
  }

  .clock-btn.active-out {
    background: #991b1b;
    border-color: #991b1b;
    color: #fff;
  }

  /* ── PIN numpad ── */
  .pin-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
    text-align: center;
    margin-bottom: 12px;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #ddd;
    background: transparent;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
  }

  .pin-dot.filled { background: #1a1a1a; border-color: #1a1a1a; transform: scale(1.15); }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
  }

  .numpad button {
    padding: 1rem 0;
    border: 1.5px solid #e5e5e5;
    border-radius: 13px;
    font-size: 22px;
    font-weight: 500;
    background: #fff;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.1s, transform 0.08s;
    font-family: inherit;
  }

  .numpad button:active { background: #e5e5e5; transform: scale(0.95); }
  .numpad button.del   { font-size: 17px; color: #888; }
  .numpad button.empty { visibility: hidden; }

  /* ── Error banner ── */
  .error-banner {
    background: #fee2e2;
    color: #991b1b;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    margin-bottom: 1.25rem;
    display: none;
    line-height: 1.5;
  }

  /* ── Result screen ── */
  .result-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 10px;
    padding: 2rem 0;
  }

  .result-wrap.visible { display: flex; }

  .result-icon { font-size: 60px; line-height: 1; margin-bottom: 4px; }

  .result-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #1a1a1a;
  }

  .result-action {
    font-size: 14px;
    color: #888;
    margin-bottom: 8px;
  }

  .result-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; padding: 4px 12px;
    border-radius: 99px; margin-bottom: 6px;
  }

  .result-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-green::before { background: #16a34a; }
  .badge-amber { background: #fef3c7; color: #92400e; }
  .badge-amber::before { background: #d97706; }
  .badge-red   { background: #fee2e2; color: #991b1b; }
  .badge-red::before   { background: #dc2626; }

  .result-msg { font-size: 13px; color: #999; max-width: 280px; line-height: 1.6; white-space: pre-line; }

  /* ── Star rating ── */
  .stars-wrap {
    background: #fff;
    border: 1.5px solid #e5e5e5;
    border-radius: 14px;
    padding: 1.1rem 1rem 0.9rem;
    width: 100%;
    max-width: 300px;
    margin-top: 6px;
  }

  .stars-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #bbb; text-align: center; margin-bottom: 10px;
  }

  .stars-row { display: flex; justify-content: center; gap: 4px; }

  .star-btn {
    font-size: 36px; background: none; border: none; cursor: pointer;
    color: #e5e5e5; line-height: 1; transition: color 0.12s, transform 0.1s;
    padding: 2px; font-family: inherit;
  }

  .star-btn.lit { color: #f59e0b; }
  .star-btn:active { transform: scale(0.82); }

  .stars-sub {
    text-align: center; font-size: 12px; font-weight: 600;
    color: #aaa; margin-top: 8px; min-height: 16px;
  }

  .stars-sub.done { color: #16a34a; }

  .done-btn {
    width: 100%; padding: 0.95rem;
    background: #1a1a1a; color: #fff;
    border: none; border-radius: 13px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    margin-top: 1.5rem;
    transition: opacity 0.15s, transform 0.1s;
  }

  .done-btn:active { transform: scale(0.97); opacity: 0.85; }

  @media (min-width: 460px) {
    body { background: #eaeae8; padding-top: 2rem; }
    .page {
      min-height: auto;
      border-radius: 20px;
      background: #f5f5f3;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      margin: 0 1rem;
    }
  }
</style>
</head>
<body>
<div class="page">
  <div class="logo">VIT · Event Intelligence</div>

  <!-- Loading -->
  <div id="view-loading" class="state-center">
    <div class="spinner-ring"></div>
    <div class="state-sub">Looking up tag…</div>
  </div>

  <!-- No tag in URL -->
  <div id="view-notag" class="state-center" style="display:none;">
    <div class="state-icon">📲</div>
    <div class="state-title">Scan a tag</div>
    <div class="state-sub">Hold your phone near an NFC tag to get started.</div>
  </div>

  <!-- Main scan UI -->
  <div id="view-main" class="main-content" style="display:none;">

    <label class="field-label">Manager</label>
    <select id="mgr-select">
      <option value="">Select manager…</option>
    </select>

    <div class="worker-card" id="worker-card">
      <!-- populated by renderCard() -->
    </div>

    <div class="clock-toggle">
      <button class="clock-btn" id="btn-in"  onclick="selectAction('Clock IN')">Clock In</button>
      <button class="clock-btn" id="btn-out" onclick="selectAction('Clock Out')">Clock Out</button>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="pin-label">Manager PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="numpad">
      <button onclick="pk('1')">1</button><button onclick="pk('2')">2</button><button onclick="pk('3')">3</button>
      <button onclick="pk('4')">4</button><button onclick="pk('5')">5</button><button onclick="pk('6')">6</button>
      <button onclick="pk('7')">7</button><button onclick="pk('8')">8</button><button onclick="pk('9')">9</button>
      <button class="empty"></button><button onclick="pk('0')">0</button><button class="del" onclick="pb()">⌫</button>
    </div>
  </div>

  <!-- Result -->
  <div id="view-result" class="result-wrap">
    <div class="result-icon" id="r-icon"></div>
    <div class="result-badge" id="r-badge"></div>
    <div class="result-name"  id="r-name"></div>
    <div class="result-action" id="r-action"></div>
    <div class="result-msg"   id="r-msg"></div>
    <div class="stars-wrap" id="stars-wrap" style="display:none;">
      <div class="stars-title">Rate this worker</div>
      <div class="stars-row">
        <button class="star-btn" id="s1" onclick="rateStar(1)">★</button>
        <button class="star-btn" id="s2" onclick="rateStar(2)">★</button>
        <button class="star-btn" id="s3" onclick="rateStar(3)">★</button>
        <button class="star-btn" id="s4" onclick="rateStar(4)">★</button>
        <button class="star-btn" id="s5" onclick="rateStar(5)">★</button>
      </div>
      <div class="stars-sub" id="stars-sub"></div>
    </div>
    <button class="done-btn" onclick="reset()">Done</button>
  </div>

</div>
<script>
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbwqD9_IIQcfsCr9X_kTtF1d5wKo06SLrcPmv314GGTIQ7VgZbLYOHpZ7bJyzpuqK5ldXQ/exec';
const STAR_LABELS = ['','Poor','Fair','Good','Great','Excellent'];

const MANAGERS = {
  'Rob Jones':     '8608',
  'Peter Meza':    '8608',
  'Geo AVS':       '8608',
  'Jasmine Biondi':'8608',
  'John AVS':      '8608',
  'Jorge Rendon':  '8608',
  'Chad AVS':      '8608',
};

const params  = new URLSearchParams(window.location.search);
const TAG_UID = params.get('uid')   || '';
const TAG_ID  = params.get('tagId') || '';

let pinBuffer    = '';
let selectedAction = '';   // 'Clock IN' or 'Clock Out'
let workerData   = null;
let ratingDone   = false;
const PIN_LEN    = 4;

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!TAG_ID) { show('view-notag'); return; }
  populateManagers();
  loadWorker();
});

function populateManagers() {
  const sel = document.getElementById('mgr-select');
  Object.keys(MANAGERS).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
}

// ── Load worker info then reveal UI ───────────────────────────────────────────
async function loadWorker() {
  show('view-loading');
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getTagStatus&tagId=${encodeURIComponent(TAG_ID)}`);
    workerData = await res.json();
  } catch(e) {
    workerData = { assigned: false, tagId: TAG_ID, error: true };
  }

  renderCard(workerData);
  autoSelectAction(workerData);

  show('view-main');
  // Small delay so display:block is painted before transition fires
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('view-main').classList.add('visible');
  }));
}

// ── Render worker card ────────────────────────────────────────────────────────
function renderCard(d) {
  const card = document.getElementById('worker-card');
  const today = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

  if (!d.assigned) {
    card.innerHTML = `
      <div class="worker-card-name" style="color:#888;font-size:18px;">Tag Not Assigned</div>
      <div class="worker-card-position" style="margin-bottom:10px;">Tag ${esc(d.tagId || TAG_ID)}</div>
      <div class="card-rows">
        <div class="card-row"><span class="ck">Date</span><span class="cv">${today}</span></div>
      </div>
      <div style="margin-top:12px;padding:10px 0 2px;font-size:12px;color:#aaa;line-height:1.6;">
        This tag hasn't been assigned to a worker yet. Please verify with your supervisor or text
        <strong style="color:#555;">John Seboria at 404-922-8608</strong>.
      </div>`;
    return;
  }

  const statusMap = {
    clocked_in:     ['pill-in',    'Clocked In'],
    clocked_out:    ['pill-out',   'Clocked Out'],
    at_lunch:       ['pill-lunch', 'At Lunch'],
    not_clocked_in: ['pill-none',  'Not Clocked In'],
  };
  const [pillClass, pillLabel] = statusMap[d.status] || statusMap['not_clocked_in'];

  card.innerHTML = `
    <div class="worker-card-name">${esc(d.workerName)}</div>
    <div class="worker-card-position">${esc(d.position || '—')}</div>
    <div class="card-rows">
      <div class="card-row"><span class="ck">Tag</span><span class="cv">${esc(d.tagId || TAG_ID)}</span></div>
      <div class="card-row"><span class="ck">Date</span><span class="cv">${today}</span></div>
      <div class="card-row"><span class="ck">Booked Time</span><span class="cv">${esc(d.bookedTime || '—')}</span></div>
      <div class="card-row"><span class="ck">Room</span><span class="cv">${esc(d.room || '—')}</span></div>
      <div class="card-row"><span class="ck">Status</span><span class="cv"><span class="status-pill ${pillClass}">${pillLabel}</span></span></div>
      ${d.lastScanTime ? `<div class="card-row"><span class="ck">Last scan</span><span class="cv">${esc(d.lastScanRoom)} · ${esc(d.lastScanTime)}</span></div>` : ''}
    </div>`;
}

// ── Auto-select Clock In or Clock Out based on status ─────────────────────────
function autoSelectAction(d) {
  if (!d.assigned) return;
  // If clocked in → pre-select Clock Out. Otherwise → pre-select Clock In.
  const action = (d.status === 'clocked_in' || d.status === 'at_lunch') ? 'Clock Out' : 'Clock IN';
  selectAction(action);
}

function selectAction(action) {
  selectedAction = action;
  document.getElementById('btn-in').className  = 'clock-btn' + (action === 'Clock IN'  ? ' active-in'  : '');
  document.getElementById('btn-out').className = 'clock-btn' + (action === 'Clock Out' ? ' active-out' : '');
  hideBanner();
}

// ── PIN numpad ────────────────────────────────────────────────────────────────
function pk(digit) {
  if (pinBuffer.length >= PIN_LEN) return;
  pinBuffer += digit; updateDots();
  if (pinBuffer.length === PIN_LEN) verifyAndSubmit();
}

function pb() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

function updateDots() {
  for (let i = 0; i < PIN_LEN; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
}

// ── Verify PIN and submit ─────────────────────────────────────────────────────
async function verifyAndSubmit() {
  const mgrName = document.getElementById('mgr-select').value;

  if (!mgrName)        { showBanner('Please select a manager.'); pinBuffer = ''; updateDots(); return; }
  if (!selectedAction) { showBanner('Select Clock In or Clock Out first.'); pinBuffer = ''; updateDots(); return; }

  const pin = MANAGERS[mgrName];
  if (!pin || pin !== pinBuffer) {
    showBanner('Incorrect PIN. Try again.');
    pinBuffer = ''; updateDots(); return;
  }

  hideBanner();
  disableNumpad(true);

  const url = `${SCRIPT_URL}?uid=${encodeURIComponent(TAG_UID)}&tagId=${encodeURIComponent(TAG_ID)}&manager=${encodeURIComponent(mgrName)}&room=${encodeURIComponent(selectedAction)}&phase=General`;

  try {
    const res  = await fetch(url);
    const text = await res.text();
    if (text.includes('DUPLICATE')) {
      showResult('duplicate', '', 'This tag was scanned in the last 60 seconds.');
    } else if (text.includes('ERROR')) {
      let msg = text.replace('ERROR:', '').trim();
      if (msg.toLowerCase().includes('not scheduled')) {
        msg += '\n\nPlease verify this person is scheduled to work with you today by texting John Seboria at 404-922-8608.';
      }
      showResult('error', '', msg);
    } else {
      const workerName = text.split('|')[0].trim();
      showResult('success', workerName, selectedAction);
    }
  } catch(e) {
    showResult('error', '', 'Connection error. Check your network.');
  }

  disableNumpad(false);
  pinBuffer = ''; updateDots();
}

// ── Result ────────────────────────────────────────────────────────────────────
function showResult(status, name, detail) {
  const icon    = { success: '✅', duplicate: '⚠️', error: '🔔' }[status];
  const badgeCls= { success: 'badge-green', duplicate: 'badge-amber', error: 'badge-amber' }[status];
  const badgeTxt= { success: 'Logged', duplicate: 'Duplicate', error: 'Heads Up' }[status];

  document.getElementById('r-icon').textContent   = icon;
  const rb = document.getElementById('r-badge');
  rb.className = 'result-badge ' + badgeCls;
  rb.textContent = badgeTxt;
  document.getElementById('r-name').textContent   = (status === 'success' && name) ? name : (TAG_ID ? 'Tag ' + TAG_ID : '');
  document.getElementById('r-action').textContent = status === 'success' ? detail : '';
  document.getElementById('r-msg').textContent    = status !== 'success' ? detail : '';

  // Stars on success Clock IN / Clock Out
  ratingDone = false;
  const starsWrap = document.getElementById('stars-wrap');
  if (status === 'success' && TAG_ID) {
    document.getElementById('stars-sub').textContent = '';
    document.getElementById('stars-sub').className   = 'stars-sub';
    renderStars(0);
    starsWrap.style.display = 'block';
  } else {
    starsWrap.style.display = 'none';
  }

  show('view-result');
  document.getElementById('view-result').classList.add('visible');
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function rateStar(n) {
  if (ratingDone) return;
  renderStars(n);
  document.getElementById('stars-sub').textContent = STAR_LABELS[n];
  setTimeout(() => submitRating(n), 400);
}

function renderStars(n) {
  for (let i = 1; i <= 5; i++)
    document.getElementById('s' + i).classList.toggle('lit', i <= n);
}

async function submitRating(stars) {
  if (ratingDone || !TAG_ID) return;
  ratingDone = true;
  const sub = document.getElementById('stars-sub');
  sub.textContent = 'Rating submitted ✓';
  sub.className   = 'stars-sub done';
  try {
    await fetch(`${SCRIPT_URL}?action=submitRating&tagId=${encodeURIComponent(TAG_ID)}&rating=${stars}`);
  } catch(e) {}
}

// ── Reset → go back to scan UI ────────────────────────────────────────────────
function reset() {
  document.getElementById('view-result').classList.remove('visible');
  show('view-main');
  document.getElementById('mgr-select').value = '';
  selectAction('');
  pinBuffer = ''; updateDots();
  hideBanner();
  // Reload worker info to reflect updated status
  loadWorker();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) {
  ['view-loading','view-notag','view-main','view-result'].forEach(v => {
    const el = document.getElementById(v);
    if (v === 'view-result') return; // result uses its own display logic
    el.style.display = (v === id) ? '' : 'none';
  });
  if (id !== 'view-result') {
    document.getElementById('view-result').classList.remove('visible');
  }
}

function showBanner(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg; b.style.display = 'block';
}

function hideBanner() {
  document.getElementById('error-banner').style.display = 'none';
}

function disableNumpad(disabled) {
  document.querySelectorAll('.numpad button').forEach(b => b.disabled = disabled);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
