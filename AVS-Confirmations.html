<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>AVS · Shift Confirmation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    background: #f2f2f2;
    color: #111;
  }

  /* ── Header ── */
  .header {
    background: #111;
    padding: 2.25rem 1.5rem 1.75rem;
    padding-top: calc(2.25rem + env(safe-area-inset-top, 0px));
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .avs-mark {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
  }

  .avs-mark span { color: #cc1515; }

  .header-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .worker-block { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.25rem; }

  .worker-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #cc1515;
    margin-bottom: 5px;
  }

  .worker-name {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  /* ── Loading ── */
  .loading-wrap {
    padding: 3rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .spinner {
    width: 30px; height: 30px;
    border: 2.5px solid rgba(255,255,255,0.12);
    border-top-color: #cc1515;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-msg { font-size: 13px; color: rgba(255,255,255,0.35); }

  /* ── Body ── */
  .body {
    padding: 1.25rem 1.25rem 4rem;
    max-width: 520px;
    margin: 0 auto;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
    margin-top: 1.5rem;
  }

  .section-title:first-child { margin-top: 0; }

  /* ── Shift table block ── */
  .shift-block {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e0e0e0;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .shift-block-header {
    background: #111;
    padding: 11px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .shift-block-event {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .shift-block-index {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Clean data table */
  .data-table { width: 100%; border-collapse: collapse; }

  .data-table tr { border-bottom: 1px solid #f0f0f0; }
  .data-table tr:last-child { border-bottom: none; }

  .data-table td {
    padding: 10px 14px;
    font-size: 13px;
    vertical-align: top;
    line-height: 1.45;
  }

  .data-table td.col-label {
    width: 38%;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    padding-right: 8px;
    white-space: nowrap;
  }

  .data-table td.col-value {
    color: #111;
    font-weight: 500;
  }

  .data-table td.col-value.accent { color: #cc1515; font-weight: 700; }

  .data-table tr.highlight-row { background: #fafafa; }

  /* ── Action buttons ── */
  .actions { margin-top: 1.75rem; display: flex; flex-direction: column; gap: 10px; }

  .btn {
    width: 100%;
    padding: 1rem 1.25rem;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .btn:active   { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .btn-confirm { background: #cc1515; color: #fff; }
  .btn-confirm:hover { background: #b01010; }
  .btn-deny    { background: #fff; color: #444; border: 1.5px solid #ddd; }

  .action-note {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 10px;
    line-height: 1.6;
  }

  /* ── Result states ── */
  .result-wrap { padding: 2.5rem 1.5rem 2rem; text-align: center; }

  .result-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 28px;
    font-weight: 900;
  }

  .icon-confirm { background: rgba(204,21,21,0.12); color: #cc1515; }
  .icon-deny    { background: rgba(0,0,0,0.08);      color: #555; }

  .result-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 1rem;
  }

  .badge-confirmed { background: rgba(204,21,21,0.12); color: #cc1515; }
  .badge-denied    { background: rgba(0,0,0,0.08);      color: #555; }

  .result-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 0.5rem;
  }

  .result-msg {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto;
  }

  .close-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin-top: 2rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Error ── */
  .error-wrap { padding: 2rem 1.5rem; text-align: center; }

  .error-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
    margin-top: 1rem;
    text-align: left;
  }

  .contact-line {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 1.25rem;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="avs-mark">A<span>V</span>S</div>
    <div class="header-label">Shift Confirmation</div>
  </div>
  <div class="worker-block" id="worker-block">
    <div class="worker-eyebrow">Technician</div>
    <div class="worker-name" id="worker-name">Loading…</div>
  </div>
</div>

<div id="app">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-msg">Fetching your shift details…</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNQfJvcLXH_lT-eQAixg3yEHeH1dYPNpL5yNynLclaRUFuNv6bUrwrgeVKybQGrlnjOA/exec';

const params = new URLSearchParams(window.location.search);
const NAME   = params.get('n') || '';
const DATE   = params.get('d') || '';

let shiftData = null;

async function init() {
  if (!NAME || !DATE) {
    showError('Shift link is incomplete. Please use the link sent to you by AVS.');
    return;
  }

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getShiftDetails&tag=${encodeURIComponent(NAME)}&date=${encodeURIComponent(DATE)}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    shiftData = data;

    document.getElementById('worker-name').textContent = data.workerName || NAME;

    if (data.existing === 'Confirmed' || data.existing === 'Denied') {
      showResult(data.existing === 'Confirmed' ? 'Y' : 'N', data.workerName, true);
    } else {
      showShiftCard(data);
    }

  } catch(e) {
    showError('Could not load shift details. Check your connection and try again.');
  }
}

// ── Build shift cards ─────────────────────────────────────────────────────────
function showShiftCard(data) {
  const shifts = data.shifts || [];

  // Deduplicate by time + position
  const seen   = new Set();
  const unique = shifts.filter(s => {
    const k = (s.time + '|' + s.position).toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  const label = unique.length > 1
    ? unique.length + ' shifts scheduled for ' + formatDateFull(DATE)
    : 'Shift details for ' + formatDateFull(DATE);

  let cardsHtml = '';
  unique.forEach((s, idx) => {
    const indexLabel = unique.length > 1 ? 'Shift ' + (idx + 1) + ' of ' + unique.length : '';
    cardsHtml += `
      <div class="shift-block">
        <div class="shift-block-header">
          <span class="shift-block-event">${escHtml(s.event || 'AVS Event')}</span>
          ${indexLabel ? `<span class="shift-block-index">${indexLabel}</span>` : ''}
        </div>
        <table class="data-table">
          ${tableRow('Location',    s.location,    false, false)}
          ${tableRow('Date',        formatDateFull(DATE), true, false)}
          ${tableRow('Call Time',   s.time,        false, true)}
          ${tableRow('Position',    s.position,    true,  false)}
          ${tableRow('Description', s.description, false, false)}
          ${s.room ? tableRow('Room / Area', s.room, true, false) : ''}
        </table>
      </div>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="body">
      <div class="section-title">${escHtml(label)}</div>
      ${cardsHtml}
      <div class="actions">
        <button class="btn btn-confirm" id="confirm-btn" onclick="respond('Y')">
          ✓ &nbsp;Confirm my attendance
        </button>
        <button class="btn btn-deny" id="deny-btn" onclick="respond('N')">
          I'm unable to make it
        </button>
      </div>
      <p class="action-note">
        Your response is sent directly to your AVS supervisor.<br>
        If you have questions call or text your contact.
      </p>
    </div>`;
}

function tableRow(label, value, highlight, accent) {
  if (!value) return '';
  return `
    <tr${highlight ? ' class="highlight-row"' : ''}>
      <td class="col-label">${label}</td>
      <td class="col-value${accent ? ' accent' : ''}">${escHtml(value)}</td>
    </tr>`;
}

// ── Submit response ───────────────────────────────────────────────────────────
async function respond(r) {
  const cb = document.getElementById('confirm-btn');
  const db = document.getElementById('deny-btn');
  if (cb) cb.disabled = true;
  if (db) db.disabled = true;

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=confirmShift&tag=${encodeURIComponent(NAME)}&date=${encodeURIComponent(DATE)}&response=${encodeURIComponent(r)}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    showResult(r, data.workerName || NAME, false);
  } catch(e) {
    showError('Could not save your response. Check your connection and try again.');
    if (cb) cb.disabled = false;
    if (db) db.disabled = false;
  }
}

// ── Result state ──────────────────────────────────────────────────────────────
function showResult(r, workerName, alreadyDone) {
  const isConfirm = r === 'Y';
  const firstName = (workerName || NAME).split(' ')[0];
  const badgeTxt  = isConfirm ? 'Confirmed' : 'Denied';
  const title     = isConfirm ? 'See you on site.' : 'Response recorded.';
  const msg       = alreadyDone
    ? `Your <strong style="color:#fff">${badgeTxt.toLowerCase()}</strong> response is already on file.`
    : isConfirm
      ? `Thanks, ${escHtml(firstName)}. Your supervisor has been notified. We look forward to working with you.`
      : `Thanks for the heads up, ${escHtml(firstName)}. Your supervisor has been notified.`;

  document.getElementById('app').innerHTML = `
    <div class="result-wrap">
      <div class="result-icon ${isConfirm ? 'icon-confirm' : 'icon-deny'}">
        ${isConfirm ? '✓' : '✕'}
      </div>
      <div class="result-badge ${isConfirm ? 'badge-confirmed' : 'badge-denied'}">${badgeTxt}</div>
      <div class="result-title">${title}</div>
      <p class="result-msg">${msg}</p>
      <p class="close-hint">You can close this page</p>
    </div>`;
}

// ── Error state ───────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('worker-name').textContent = '—';
  document.getElementById('app').innerHTML = `
    <div class="error-wrap">
      <div style="font-size:32px;margin-bottom:0.75rem;color:rgba(255,255,255,0.3)">⚠</div>
      <div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:0.25rem">Something went wrong</div>
      <div class="error-card">${escHtml(msg)}</div>
      <p class="contact-line">Contact your AVS supervisor directly.</p>
    </div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatDateFull(d) {
  if (!d) return '—';
  const p = d.split('/');
  if (p.length < 3) return d;
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const dt = new Date(parseInt(p[2]), parseInt(p[0])-1, parseInt(p[1]));
  return days[dt.getDay()] + ', ' + months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
