<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AVS · Shift Confirmation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #1a1a1a;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
  }

  .card {
    background: #fff;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: 2rem 1.5rem 3rem;
    display: flex;
    flex-direction: column;
  }

  /* ── Logo bar ── */
  .logo-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: #1a1a1a;
    text-transform: uppercase;
  }

  .logo span { color: #cc1515; }

  .logo-sub {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
  }

  /* ── Typography ── */
  h2 { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.02em; }

  .subtitle { font-size: 14px; color: #888; margin-bottom: 2rem; line-height: 1.55; }

  /* ── Worker name display ── */
  .worker-badge {
    background: #f5f5f5;
    border-radius: 12px;
    padding: 0.85rem 1rem;
    margin-bottom: 1.75rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .worker-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #1a1a1a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .worker-info .wname { font-weight: 700; font-size: 15px; color: #1a1a1a; }
  .worker-info .wrole { font-size: 12px; color: #aaa; margin-top: 2px; }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    margin-bottom: 8px;
    margin-top: 1.5rem;
  }

  .section-label:first-of-type { margin-top: 0; }

  /* ── Shift table card ── */
  .shift-card {
    border: 1.5px solid #e5e5e5;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .shift-card-event {
    background: #1a1a1a;
    padding: 9px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .shift-card-event .event-index {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
  }

  /* Clean data table */
  .data-table { width: 100%; border-collapse: collapse; }

  .data-table tr { border-bottom: 1px solid #f2f2f2; }
  .data-table tr:last-child { border-bottom: none; }
  .data-table tr:nth-child(even) { background: #fafafa; }

  .data-table td {
    padding: 10px 14px;
    font-size: 13px;
    vertical-align: top;
    line-height: 1.45;
  }

  .data-table td.col-key {
    width: 36%;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #aaa;
    white-space: nowrap;
    padding-right: 6px;
  }

  .data-table td.col-val {
    color: #1a1a1a;
    font-weight: 500;
  }

  .data-table td.col-val.accent {
    color: #cc1515;
    font-weight: 700;
    font-size: 14px;
  }

  /* ── Divider ── */
  .divider { border: none; border-top: 1.5px solid #f0f0f0; margin: 1.75rem 0; }

  /* ── Buttons ── */
  .btn {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }

  .btn:active   { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }
  .btn + .btn   { margin-top: 10px; }

  .btn-confirm  { background: #cc1515; color: #fff; }
  .btn-deny     { background: #f0f0f0; color: #1a1a1a; }

  .action-note {
    font-size: 12px;
    color: #bbb;
    text-align: center;
    margin-top: 1rem;
    line-height: 1.6;
  }

  /* ── Result ── */
  .result-icon {
    font-size: 48px;
    text-align: center;
    margin: 0.5rem 0 1rem;
    line-height: 1;
  }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 99px;
    margin-bottom: 1.25rem;
    letter-spacing: 0.04em;
  }

  .badge-confirmed { background: #fee2e2; color: #cc1515; }
  .badge-denied    { background: #f0f0f0; color: #555; }

  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
  .result-msg   { font-size: 14px; color: #888; line-height: 1.55; }

  .close-hint { font-size: 12px; color: #bbb; margin-top: 1.5rem; text-align: center; }

  /* ── Error ── */
  .error-box {
    background: #fee2e2;
    color: #991b1b;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 1rem;
  }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #e5e5e5;
    border-top-color: #cc1515;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading { text-align: center; padding: 3rem 0; color: #aaa; font-size: 14px; }

  @media (min-width: 480px) {
    body { padding: 2rem 1rem; background: #f0f0ee; }
    .card {
      min-height: auto;
      border-radius: 20px;
      border: 1px solid #e5e5e5;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo-bar">
    <div class="logo">A<span>V</span>S</div>
    <div class="logo-sub">Shift Confirmation</div>
  </div>

  <div id="app">
    <div class="loading">
      <span class="spinner"></span>Loading your shift details…
    </div>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxtL1OVygXIzSGT6P_RB2c6r8H4qiuioujdWIYO55Xkn2_hhCHIZdpYs2xAGyIjPwf2HA/exec';

const params = new URLSearchParams(window.location.search);
const NAME   = params.get('n') || '';
const DATE   = params.get('d') || '';

let shiftData = null;

async function init() {
  if (!NAME || !DATE) {
    showError('Shift link is incomplete. Please use the link sent to you by AVS.');
    return;
  }

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getShiftDetails&tag=${encodeURIComponent(NAME)}&date=${encodeURIComponent(DATE)}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    shiftData = data;

    if (data.existing === 'Confirmed' || data.existing === 'Denied') {
      showResult(data.existing === 'Confirmed' ? 'Y' : 'N', data.workerName, true);
    } else {
      showShiftView(data);
    }

  } catch(e) {
    showError('Could not load shift details. Check your connection and try again.');
  }
}

// ── Shift view ────────────────────────────────────────────────────────────────
function showShiftView(data) {
  const wname    = data.workerName || NAME;
  const initials = wname.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
  const shifts   = data.shifts || [];

  // Deduplicate by time + position
  const seen   = new Set();
  const unique = shifts.filter(s => {
    const k = (s.time + '|' + s.position).toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  let cardsHtml = '';
  unique.forEach((s, idx) => {
    const idxLabel = unique.length > 1 ? 'Shift ' + (idx+1) + ' of ' + unique.length : '';
    cardsHtml += `
      <div class="shift-card">
        <div class="shift-card-event">
          <span>${escHtml(s.event || 'AVS Event')}</span>
          ${idxLabel ? `<span class="event-index">${idxLabel}</span>` : ''}
        </div>
        <table class="data-table">
          ${row('Location',    s.location,    false)}
          ${row('Date',        formatDate(DATE), false)}
          ${row('Call Time',   s.time,        true)}
          ${row('Position',    s.position,    false)}
          ${row('Description', s.description, false)}
          ${s.room ? row('Room / Area', s.room, false) : ''}
        </table>
      </div>`;
  });

  const shiftCountLabel = unique.length > 1
    ? unique.length + ' shifts on ' + formatDateShort(DATE)
    : 'Your shift on ' + formatDateShort(DATE);

  document.getElementById('app').innerHTML = `
    <div class="worker-badge">
      <div class="worker-avatar">${escHtml(initials)}</div>
      <div class="worker-info">
        <div class="wname">${escHtml(wname)}</div>
        <div class="wrole">AVS Technician</div>
      </div>
    </div>

    <div class="section-label">${escHtml(shiftCountLabel)}</div>
    ${cardsHtml}

    <hr class="divider">

    <h2>Confirm your attendance</h2>
    <p class="subtitle">Please let your supervisor know if you'll be on site.</p>

    <button class="btn btn-confirm" id="confirm-btn" onclick="respond('Y')">✓ &nbsp;I'll be there</button>
    <button class="btn btn-deny"    id="deny-btn"    onclick="respond('N')">I can't make it</button>

    <p class="action-note">
      Your response goes directly to your AVS supervisor.<br>
      No action needed if you already confirmed by phone.
    </p>`;
}

function row(label, value, accent) {
  if (!value || !String(value).trim()) return '';
  return `<tr>
    <td class="col-key">${label}</td>
    <td class="col-val${accent ? ' accent' : ''}">${escHtml(value)}</td>
  </tr>`;
}

// ── Submit response ───────────────────────────────────────────────────────────
async function respond(r) {
  const cb = document.getElementById('confirm-btn');
  const db = document.getElementById('deny-btn');
  if (cb) cb.disabled = true;
  if (db) db.disabled = true;

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=confirmShift&tag=${encodeURIComponent(NAME)}&date=${encodeURIComponent(DATE)}&response=${encodeURIComponent(r)}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    showResult(r, data.workerName || NAME, false);
  } catch(e) {
    showError('Could not save your response. Check your connection and try again.');
    if (cb) cb.disabled = false;
    if (db) db.disabled = false;
  }
}

// ── Result ────────────────────────────────────────────────────────────────────
function showResult(r, workerName, alreadyDone) {
  const isConfirm = r === 'Y';
  const firstName = (workerName || NAME).split(' ')[0];
  const badgeTxt  = isConfirm ? 'Confirmed' : 'Denied';
  const title     = isConfirm ? 'See you on site!' : 'Response recorded.';
  const msg       = alreadyDone
    ? `Your <strong>${badgeTxt.toLowerCase()}</strong> response is already on file.`
    : isConfirm
      ? `Thanks, ${escHtml(firstName)}! Your supervisor has been notified. We look forward to working with you.`
      : `Thanks for the heads up, ${escHtml(firstName)}. Your supervisor has been notified.`;

  document.getElementById('app').innerHTML = `
    <div class="result-icon">${isConfirm ? '✅' : '❌'}</div>
    <span class="result-badge ${isConfirm ? 'badge-confirmed' : 'badge-denied'}">${badgeTxt}</span>
    <h2 class="result-title">${title}</h2>
    <p class="result-msg">${msg}</p>
    <p class="close-hint">You can close this page.</p>`;
}

// ── Error ─────────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="result-icon">⚠️</div>
    <h2 class="result-title">Something went wrong</h2>
    <div class="error-box">${escHtml(msg)}</div>
    <p class="close-hint">Contact your AVS supervisor directly.</p>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatDate(d) {
  if (!d) return '—';
  const p = d.split('/');
  if (p.length < 3) return d;
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const dt = new Date(parseInt(p[2]), parseInt(p[0])-1, parseInt(p[1]));
  return days[dt.getDay()] + ', ' + months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear();
}

function formatDateShort(d) {
  if (!d) return '—';
  const p = d.split('/');
  if (p.length < 3) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (months[parseInt(p[0])-1] || p[0]) + ' ' + parseInt(p[1]);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
