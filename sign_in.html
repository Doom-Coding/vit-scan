<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIT · Tag Assignment</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0ee;
    min-height: 100vh;
    color: #1a1a1a;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 1rem; }

  .logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .header-title { font-size: 15px; font-weight: 600; }
  .header-meta  { font-size: 12px; opacity: 0.5; }

  .controls {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 1rem 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .control-group { display: flex; flex-direction: column; gap: 4px; }

  .control-group label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
  }

  .control-group select,
  .control-group input[type="date"] {
    padding: 0.5rem 0.75rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    background: #fafafa;
    color: #1a1a1a;
    appearance: none;
    -webkit-appearance: none;
    min-width: 200px;
    cursor: pointer;
  }

  .control-group select:focus,
  .control-group input[type="date"]:focus {
    outline: none;
    border-color: #1a1a1a;
    background: #fff;
  }

  .btn-load {
    padding: 0.5rem 1.25rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    align-self: flex-end;
  }

  .btn-load:hover { opacity: 0.8; }
  .btn-load:disabled { opacity: 0.4; cursor: default; }

  .stats-bar {
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 1.5rem;
    font-size: 13px;
    color: #666;
    border-bottom: 1px solid #e5e5e5;
    background: #fff;
    flex-wrap: wrap;
  }

  .stat { display: flex; gap: 6px; align-items: center; }
  .stat strong { color: #1a1a1a; font-weight: 600; }

  .main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }

  .event-group { margin-bottom: 2rem; }

  .event-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .event-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: #1a1a1a;
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .event-count { font-size: 12px; color: #888; }

  .worker-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e5e5e5;
  }

  .worker-table th {
    background: #f8f8f8;
    padding: 0.6rem 1rem;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    border-bottom: 1px solid #e5e5e5;
  }

  .worker-table td {
    padding: 0.75rem 1rem;
    font-size: 14px;
    border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }

  .worker-table tr:last-child td { border-bottom: none; }
  .worker-table tr.assigned { background: #f0fdf4; }
  .worker-table tr.assigned td { color: #166534; }

  .worker-name { font-weight: 600; color: #1a1a1a; }
  .worker-position { font-size: 12px; color: #888; margin-top: 2px; }
  .worker-time { font-size: 13px; color: #555; white-space: nowrap; }
  .worker-room { font-size: 13px; color: #555; }

  .tag-input-wrap { display: flex; gap: 6px; align-items: center; }

  .tag-input {
    width: 80px;
    padding: 0.4rem 0.6rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    background: #fafafa;
    transition: border-color 0.15s;
  }

  .tag-input:focus { outline: none; border-color: #1a1a1a; background: #fff; }
  .tag-input.has-value { border-color: #166534; background: #f0fdf4; color: #166534; }

  .save-btn {
    padding: 0.35rem 0.75rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .save-btn:hover { opacity: 0.8; }
  .save-btn.saved { background: #166534; }
  .save-btn.saving { opacity: 0.5; cursor: default; }
  .save-btn:disabled { opacity: 0.3; cursor: default; }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .status-dot.saved   { background: #22c55e; }
  .status-dot.unsaved { background: #e5e5e5; }
  .status-dot.saving  { background: #f59e0b; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: #888;
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; color: #1a1a1a; }
  .empty-state p { font-size: 14px; }

  .loading {
    text-align: center;
    padding: 4rem;
    color: #888;
    font-size: 14px;
  }

  .spinner-inline {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ddd;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #1a1a1a;
    color: #fff;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #166534; }
  .toast.error   { background: #991b1b; }

  @media (max-width: 640px) {
    .controls { flex-direction: column; }
    .control-group select { min-width: 100%; }
    .worker-table th:nth-child(3),
    .worker-table td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo">VIT</span>
    <span class="header-title">Tag Assignment</span>
  </div>
  <span class="header-meta" id="header-date"></span>
</header>

<div class="controls">
  <div class="control-group">
    <label>Location</label>
    <select id="location-select">
      <option value="">Select location…</option>
    </select>
  </div>
  <div class="control-group">
    <label>Date</label>
    <input type="date" id="date-select">
  </div>
  <button class="btn-load" id="load-btn" onclick="loadWorkers()">Load Workers</button>
</div>

<div class="stats-bar" id="stats-bar" style="display:none;">
  <div class="stat">Total booked: <strong id="stat-total">0</strong></div>
  <div class="stat">Tags assigned: <strong id="stat-assigned">0</strong></div>
  <div class="stat">Unassigned: <strong id="stat-unassigned">0</strong></div>
</div>

<div class="main" id="main-content">
  <div class="empty-state">
    <div class="icon">📋</div>
    <h3>Select a location and date</h3>
    <p>Workers will appear grouped by event, sorted by call time.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbyNQfJvcLXH_lT-eQAixg3yEHeH1dYPNpL5yNynLclaRUFuNv6bUrwrgeVKybQGrlnjOA/exec';
const LABOR_SHEET_ID = '1-ZZCVxUOe99c7C0I7nqai9a56uOOMmySjH76bhjk9ZE';

let allWorkers = [];

window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('date-select').value = today.toISOString().split('T')[0];
  document.getElementById('header-date').textContent = today.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
  loadLocations();
});

async function loadLocations() {
  try {
    const url  = `${SCRIPT_URL}?action=getLocations&sheetId=${encodeURIComponent(LABOR_SHEET_ID)}`;
    const res  = await fetch(url);
    const data = await res.json();
    const select = document.getElementById('location-select');
    if (data.locations && data.locations.length) {
      data.locations.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc; opt.textContent = loc;
        select.appendChild(opt);
      });
      if (data.locations.length === 1) select.value = data.locations[0];
    }
  } catch (e) {
    const select = document.getElementById('location-select');
    const opt = document.createElement('option');
    opt.value = 'FL - Caribe Royale Orlando - 4006';
    opt.textContent = 'FL - Caribe Royale Orlando - 4006';
    select.appendChild(opt);
  }
}

async function loadWorkers() {
  const location = document.getElementById('location-select').value;
  const date     = document.getElementById('date-select').value;

  if (!location) { showToast('Please select a location.', 'error'); return; }
  if (!date)     { showToast('Please select a date.', 'error'); return; }

  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span>Loading…';
  document.getElementById('main-content').innerHTML = '<div class="loading"><span class="spinner-inline"></span>Fetching worker list…</div>';

  try {
    const url  = `${SCRIPT_URL}?action=getWorkers&sheetId=${encodeURIComponent(LABOR_SHEET_ID)}&location=${encodeURIComponent(location)}&date=${encodeURIComponent(date)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) {
      showToast(data.error, 'error');
      document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Error loading workers</h3><p>${data.error}</p></div>`;
      return;
    }

    allWorkers = data.workers || [];
    renderWorkers(allWorkers);
    updateStats();

  } catch (e) {
    showToast('Could not connect. Check your network.', 'error');
    document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="icon">❌</div><h3>Connection error</h3><p>Could not reach the server. Try again.</p></div>';
  }

  btn.disabled = false;
  btn.textContent = 'Load Workers';
}

function renderWorkers(workers) {
  if (!workers.length) {
    document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No workers found</h3><p>No bookings for this location and date.</p></div>';
    document.getElementById('stats-bar').style.display = 'none';
    return;
  }

  const groups = {};
  workers.forEach((w, idx) => {
    const event = w.eventName || 'Unassigned';
    if (!groups[event]) groups[event] = [];
    groups[event].push({ ...w, idx });
  });

  Object.values(groups).forEach(g => {
    g.sort((a, b) => parseTime(a.bookedTime) - parseTime(b.bookedTime));
  });

  let html = '';
  Object.entries(groups).sort(([a], [b]) => a.localeCompare(b)).forEach(([event, rows]) => {
    html += `
      <div class="event-group">
        <div class="event-header">
          <span class="event-label">${escHtml(event)}</span>
          <span class="event-count">${rows.length} worker${rows.length !== 1 ? 's' : ''}</span>
        </div>
        <table class="worker-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Call Time</th>
              <th>Room / Area</th>
              <th style="width:160px;">Tag #</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(w => renderRow(w)).join('')}
          </tbody>
        </table>
      </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
  document.getElementById('stats-bar').style.display = 'flex';

  workers.forEach(w => {
    if (w.tagId) {
      const input = document.getElementById(`tag-${w.idx}`);
      if (input) { input.value = w.tagId; input.classList.add('has-value'); markSaved(w.idx); }
    }
  });
}

function renderRow(w) {
  const hasSaved = w.tagId ? 'assigned' : '';
  return `
    <tr id="row-${w.idx}" class="${hasSaved}">
      <td>
        <div class="worker-name">${escHtml(w.name)}</div>
        <div class="worker-position">${escHtml(w.position || '')}</div>
      </td>
      <td><span class="worker-time">${escHtml(w.bookedTime || '—')}</span></td>
      <td><span class="worker-room">${escHtml(w.room || '—')}</span></td>
      <td>
        <div class="tag-input-wrap">
          <span class="status-dot unsaved" id="dot-${w.idx}"></span>
          <input
            type="text"
            class="tag-input ${w.tagId ? 'has-value' : ''}"
            id="tag-${w.idx}"
            value="${w.tagId || ''}"
            placeholder="001"
            maxlength="6"
            oninput="onTagInput(${w.idx})"
            onkeydown="if(event.key==='Enter') saveTag(${w.idx})"
          >
          <button class="save-btn ${w.tagId ? 'saved' : ''}" id="savebtn-${w.idx}" onclick="saveTag(${w.idx})">
            ${w.tagId ? 'Saved' : 'Save'}
          </button>
        </div>
      </td>
    </tr>`;
}

function onTagInput(idx) {
  const input = document.getElementById(`tag-${idx}`);
  const dot   = document.getElementById(`dot-${idx}`);
  input.classList.toggle('has-value', input.value.length > 0);
  dot.className = 'status-dot unsaved';
  document.getElementById(`savebtn-${idx}`).textContent = 'Save';
  document.getElementById(`savebtn-${idx}`).classList.remove('saved');
}

async function saveTag(idx) {
  const input  = document.getElementById(`tag-${idx}`);
  const btn    = document.getElementById(`savebtn-${idx}`);
  const dot    = document.getElementById(`dot-${idx}`);
  const tagVal = input.value.trim();

  if (!tagVal) { showToast('Enter a tag number first.', 'error'); return; }

  const tagId  = tagVal.padStart(3, '0');
  input.value  = tagId;

  const worker = allWorkers[idx];
  if (!worker) return;

  btn.textContent = 'Saving…';
  btn.classList.add('saving');
  btn.disabled = true;
  dot.className = 'status-dot saving';

  try {
    const url  = `${SCRIPT_URL}?action=assignTag&tagId=${encodeURIComponent(tagId)}&workerName=${encodeURIComponent(worker.name)}&eventName=${encodeURIComponent(worker.eventName || '')}&position=${encodeURIComponent(worker.position || '')}&phone=${encodeURIComponent(worker.phone || '')}`;
    const res  = await fetch(url);
    const text = await res.text();

    if (text.includes('ERROR')) {
      showToast(text, 'error');
      btn.textContent = 'Retry';
      btn.classList.remove('saving');
      btn.disabled = false;
      dot.className = 'status-dot unsaved';
      return;
    }

    allWorkers[idx].tagId = tagId;
    markSaved(idx);
    document.getElementById(`row-${idx}`).classList.add('assigned');
    input.classList.add('has-value');
    showToast(`Tag ${tagId} → ${worker.name}`, 'success');
    updateStats();

  } catch (e) {
    showToast('Save failed. Check connection.', 'error');
    btn.textContent = 'Retry';
    btn.classList.remove('saving');
    btn.disabled = false;
    dot.className = 'status-dot unsaved';
  }
}

function markSaved(idx) {
  const btn = document.getElementById(`savebtn-${idx}`);
  const dot = document.getElementById(`dot-${idx}`);
  if (btn) { btn.textContent = 'Saved'; btn.classList.add('saved'); btn.classList.remove('saving'); btn.disabled = false; }
  if (dot) { dot.className = 'status-dot saved'; }
}

function updateStats() {
  const total    = allWorkers.length;
  const assigned = allWorkers.filter(w => w.tagId).length;
  document.getElementById('stat-total').textContent      = total;
  document.getElementById('stat-assigned').textContent   = assigned;
  document.getElementById('stat-unassigned').textContent = total - assigned;
  document.getElementById('stats-bar').style.display     = total ? 'flex' : 'none';
}

function parseTime(str) {
  if (!str) return 9999;
  const m = str.match(/^(\d+)(?::(\d+))?\s*(am|pm)?/i);
  if (!m) return 9999;
  let h = parseInt(m[1]);
  const min  = parseInt(m[2] || 0);
  const ampm = (m[3] || '').toLowerCase();
  if (ampm === 'pm' && h !== 12) h += 12;
  if (ampm === 'am' && h === 12) h = 0;
  return h * 60 + min;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}
</script>
</body>
</html>
