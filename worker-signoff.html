<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIT · Shift Sign-Off</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; min-height: 100vh; }

  header { padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e1e1e; }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.45; }
  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn { padding: 5px 12px; border: 1px solid #2a2a2a; border-radius: 6px; font-size: 11px; font-weight: 700; background: none; color: #555; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; font-family: inherit; }
  .lang-btn.active { background: #fff; color: #111; border-color: #fff; }

  .main { padding: 1.25rem; max-width: 420px; margin: 0 auto; }

  /* Loading */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 1rem; gap: 1rem; }
  .spinner { width: 28px; height: 28px; border: 2.5px solid #2a2a2a; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #555; }

  /* Worker card */
  .worker-card { background: #1a1a1a; border: 1px solid #242424; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .worker-name { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .worker-date { font-size: 13px; color: #666; margin-bottom: 3px; }
  .worker-event { font-size: 12px; color: #555; margin-bottom: 10px; }
  .worker-position-pill { display: inline-flex; align-items: center; gap: 6px; background: #242424; border-radius: 8px; padding: 5px 10px; }
  .position-icon { font-size: 11px; }
  .position-text { font-size: 12px; font-weight: 600; color: #ccc; }

  /* Hours card */
  .hours-card { background: #1a1a1a; border: 1px solid #242424; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 14px; }

  .time-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid #1e1e1e; }
  .time-row:last-of-type { border-bottom: none; }
  .time-lbl { font-size: 13px; color: #555; padding-top: 2px; }
  .time-val-wrap { text-align: right; }
  .time-val { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .time-billed-note { font-size: 11px; color: #d97706; margin-top: 2px; }
  .time-actual-note { font-size: 11px; color: #3a3a3a; margin-top: 1px; }

  .hours-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #1e1e1e; }
  .h-box { background: #111; border-radius: 10px; padding: 12px 8px; text-align: center; }
  .h-box .hval { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
  .h-box .hlbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #444; }
  .h-box.reg .hval { color: #22c55e; }
  .h-box.ot  .hval { color: #f59e0b; }
  .h-box.tot .hval { color: #fff; }

  /* Expiry bar */
  .expiry-bar { background: #1a1200; border: 1px solid #2a2000; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #a07020; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; line-height: 1.5; }
  .expiry-icon { font-size: 14px; flex-shrink: 0; }

  /* Action buttons */
  .btn-confirm { width: 100%; padding: 1rem; background: #22c55e; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s; font-family: inherit; letter-spacing: 0.01em; }
  .btn-confirm:hover { opacity: 0.88; }
  .btn-confirm:disabled { opacity: 0.4; cursor: default; }
  .btn-dispute { width: 100%; padding: 0.85rem; background: none; color: #666; border: 1px solid #242424; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn-dispute:hover { border-color: #444; color: #ccc; }

  /* Dispute form */
  .dispute-form { background: #1a1a1a; border: 1px solid #242424; border-radius: 14px; padding: 1.25rem; margin-top: 10px; display: none; }
  .dispute-form.open { display: block; }
  .dispute-section-label { font-size: 12px; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: block; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .type-btn { padding: 0.65rem; border: 1.5px solid #242424; border-radius: 8px; font-size: 13px; font-weight: 600; background: none; color: #666; cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; }
  .type-btn:hover { border-color: #444; color: #aaa; }
  .type-btn.sel { border-color: #f59e0b; color: #f59e0b; background: #1a1200; }
  .dispute-textarea { width: 100%; background: #111; border: 1.5px solid #242424; border-radius: 8px; color: #fff; padding: 0.75rem; font-size: 14px; resize: none; font-family: inherit; min-height: 80px; margin-bottom: 1rem; line-height: 1.5; }
  .dispute-textarea::placeholder { color: #3a3a3a; }
  .dispute-textarea:focus { outline: none; border-color: #f59e0b; }
  .btn-submit-dispute { width: 100%; padding: 0.9rem; background: #f59e0b; color: #111; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; font-family: inherit; }
  .btn-submit-dispute:hover { opacity: 0.88; }
  .btn-submit-dispute:disabled { opacity: 0.4; cursor: default; }

  /* State screens */
  .state-screen { padding: 3rem 1rem; text-align: center; }
  .state-icon { font-size: 56px; margin-bottom: 1rem; }
  .state-title { font-size: 22px; font-weight: 700; margin-bottom: 0.6rem; }
  .state-sub { font-size: 14px; color: #555; line-height: 1.7; max-width: 300px; margin: 0 auto; }

  /* Expired shift summary */
  .expired-summary { background: #1a1a1a; border: 1px solid #242424; border-radius: 14px; padding: 1.25rem; margin-top: 1.5rem; text-align: left; }
  .exp-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #1e1e1e; font-size: 13px; }
  .exp-row:last-child { border-bottom: none; }
  .exp-lbl { color: #555; }
  .exp-val { font-weight: 600; }
  .exp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 12px; }
  .exp-box { text-align: center; background: #111; border-radius: 8px; padding: 10px 4px; }
  .exp-box .ev { font-size: 20px; font-weight: 800; }
  .exp-box .el { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 3px; }
  .exp-box.reg .ev { color: #22c55e; }
  .exp-box.ot  .ev { color: #f59e0b; }
  .exp-box.tot .ev { color: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-dot"></div>
    <span class="logo">VIT</span>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        id="btn-es" onclick="setLang('es')">ES</button>
  </div>
</header>

<div class="main" id="main">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading your shift…</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqD9_IIQcfsCr9X_kTtF1d5wKo06SLrcPmv314GGTIQ7VgZbLYOHpZ7bJyzpuqK5ldXQ/exec';

let shiftData    = null;
let currentLang  = 'en';
let selectedType = '';

const S = {
  en: {
    loading:        'Loading your shift…',
    yourShift:      'Your Shift',
    position:       'Position',
    event:          'Event',
    clockIn:        'Clock In',
    clockOut:       'Clock Out',
    billedAs:       '→ billed as',
    actual:         'actual',
    reg:            'Regular',
    ot:             'OT',
    total:          'Total',
    billingNote:    'How hours are calculated',
    billingPolicy:  'Clock-in snaps to your scheduled call time if you arrive within 30 minutes early. If you arrive late, it rounds to the nearest 15 minutes. Clock-out rounds to the nearest half hour (5-hr shifts) or nearest full hour (10-hr shifts).',
    expiresIn:      'Expires in',
    autoConfirm:    'Auto-confirms if no response.',
    confirmBtn:     '✓  Confirm My Hours',
    disputeBtn:     'Something looks wrong',
    disputeTitle:   'What would you like to dispute?',
    typeHours:      'Hours',
    typePosition:   'Position',
    typeBoth:       'Both',
    typeOther:      'Other',
    describeLabel:  'Describe the issue',
    placeholder:    'Please describe what seems incorrect…',
    submitDispute:  'Submit Dispute',
    confirmedTitle: 'Hours Confirmed',
    confirmedSub:   'Thank you. Your shift hours have been confirmed and recorded.',
    disputedTitle:  'Dispute Submitted',
    disputedSub:    'Your dispute has been received. A supervisor will review it and follow up with you.',
    expiredTitle:   'Link Expired',
    expiredSub:     'This sign-off link has expired. Your hours have been auto-confirmed as shown below.',
    alreadyTitle:   'Already Responded',
    alreadySub:     'You have already submitted a response for this shift.',
    resolvedTitle:  'Shift Resolved',
    resolvedSub:    'This shift has been reviewed and resolved by a supervisor.',
    errorTitle:     'Link Not Found',
    errorSub:       'This sign-off link is invalid or has expired.',
    typeRequired:   'Please select what you are disputing.',
    noteRequired:   'Please describe the issue before submitting.',
    submitting:     'Submitting…',
  },
  es: {
    loading:        'Cargando tu turno…',
    yourShift:      'Tu Turno',
    position:       'Posición',
    event:          'Evento',
    clockIn:        'Entrada',
    clockOut:       'Salida',
    billedAs:       '→ facturado como',
    actual:         'real',
    reg:            'Regular',
    ot:             'Extra',
    total:          'Total',
    billingNote:    'Cómo se calculan las horas',
    billingPolicy:  'La entrada se ajusta a tu hora programada si llegas con 30 minutos de anticipación o menos. Si llegas tarde, se redondea a los 15 minutos más cercanos. La salida se redondea a la media hora más cercana (turnos de 5 hrs) o a la hora entera más cercana (turnos de 10 hrs).',
    expiresIn:      'Expira en',
    autoConfirm:    'Se confirma automáticamente si no hay respuesta.',
    confirmBtn:     '✓  Confirmar Mis Horas',
    disputeBtn:     'Algo parece incorrecto',
    disputeTitle:   '¿Qué deseas disputar?',
    typeHours:      'Horas',
    typePosition:   'Posición',
    typeBoth:       'Ambos',
    typeOther:      'Otro',
    describeLabel:  'Describe el problema',
    placeholder:    'Por favor describe lo que parece incorrecto…',
    submitDispute:  'Enviar Disputa',
    confirmedTitle: 'Horas Confirmadas',
    confirmedSub:   'Gracias. Tus horas de turno han sido confirmadas y registradas.',
    disputedTitle:  'Disputa Enviada',
    disputedSub:    'Tu disputa ha sido recibida. Un supervisor la revisará y se comunicará contigo.',
    expiredTitle:   'Enlace Expirado',
    expiredSub:     'Este enlace ha expirado. Tus horas han sido confirmadas automáticamente como se muestra.',
    alreadyTitle:   'Ya Respondiste',
    alreadySub:     'Ya enviaste una respuesta para este turno.',
    resolvedTitle:  'Turno Resuelto',
    resolvedSub:    'Este turno ha sido revisado y resuelto por un supervisor.',
    errorTitle:     'Enlace No Encontrado',
    errorSub:       'Este enlace no es válido o ha expirado.',
    typeRequired:   'Por favor selecciona qué estás disputando.',
    noteRequired:   'Por favor describe el problema antes de enviar.',
    submitting:     'Enviando…',
  }
};

function t(k) { return (S[currentLang] || S.en)[k] || S.en[k] || k; }

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.documentElement.lang = lang;
  if (shiftData) renderShift(shiftData);
  else { const el = document.getElementById('loading-text'); if (el) el.textContent = t('loading'); }
}

function getToken() {
  return new URLSearchParams(window.location.search).get('token') || '';
}

function timeRemaining(expiresAt) {
  if (!expiresAt) return '';
  const d    = new Date(expiresAt);
  const diff = d - Date.now();
  if (diff <= 0) return '';
  const hrs  = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  return hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
}

function escH(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('DOMContentLoaded', async () => {
  // Auto-detect language
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('es')) setLang('es');

  const token = getToken();
  if (!token) { renderState('error'); return; }

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getShiftForSignoff&token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (data.error) { renderState('error', data.error); return; }
    shiftData = data;
    renderShift(data);
  } catch(e) {
    renderState('error', 'Connection error. Please try again.');
  }
});

function renderShift(d) {
  const status = d.status;
  if (status === 'Confirmed') { renderState('confirmed');            return; }
  if (status === 'Disputed')  { renderState('disputed');             return; }
  if (status === 'Resolved')  { renderState('resolved');             return; }
  if (status === 'Expired')   { renderState('expired', null, d);     return; }

  const dateObj = new Date(d.date.replace(/(\d+)\/(\d+)\/(\d+)/,'$3-$1-$2') + 'T12:00:00');
  const dateStr = dateObj.toLocaleDateString(currentLang === 'es' ? 'es-US' : 'en-US', { weekday:'long', month:'long', day:'numeric' });
  const rem     = timeRemaining(d.expiresAt);

  const snappedIn  = d.actualIn  && d.billingIn  && d.actualIn  !== d.billingIn;
  const snappedOut = d.actualOut && d.billingOut && d.actualOut !== d.billingOut;

  const inHtml = snappedIn
    ? `<div class="time-val">${escH(d.billingIn)}</div>
       <div class="time-billed-note">${t('billedAs')} ${escH(d.billingIn)}</div>
       <div class="time-actual-note">${t('actual')}: ${escH(d.actualIn)}</div>`
    : `<div class="time-val">${escH(d.actualIn || '—')}</div>`;

  const outHtml = snappedOut
    ? `<div class="time-val">${escH(d.billingOut)}</div>
       <div class="time-billed-note">${t('billedAs')} ${escH(d.billingOut)}</div>
       <div class="time-actual-note">${t('actual')}: ${escH(d.actualOut)}</div>`
    : `<div class="time-val">${escH(d.actualOut || '—')}</div>`;

  document.getElementById('main').innerHTML = `
    <div class="worker-card">
      <div class="worker-name">${escH(d.worker)}</div>
      <div class="worker-date">${dateStr}</div>
      <div class="worker-event">${escH(d.event)}</div>
      ${d.position ? `<div class="worker-position-pill"><span class="position-icon">👷</span><span class="position-text">${escH(d.position)}</span></div>` : ''}
    </div>

    ${rem ? `<div class="expiry-bar"><span class="expiry-icon">⏱</span><span>${t('expiresIn')} <strong>${rem}</strong> — ${t('autoConfirm')}</span></div>` : ''}

    <div class="hours-card">
      <div class="card-label">${t('yourShift')}</div>
      <div class="time-row">
        <span class="time-lbl">${t('clockIn')}</span>
        <div class="time-val-wrap">${inHtml}</div>
      </div>
      <div class="time-row">
        <span class="time-lbl">${t('clockOut')}</span>
        <div class="time-val-wrap">${outHtml}</div>
      </div>
      <div class="hours-grid">
        <div class="h-box reg"><div class="hval">${d.regHrs  ?? '—'}</div><div class="hlbl">${t('reg')}</div></div>
        <div class="h-box ot" ><div class="hval">${d.otHrs   ?? '—'}</div><div class="hlbl">${t('ot')}</div></div>
        <div class="h-box tot"><div class="hval">${d.totalHrs ?? '—'}</div><div class="hlbl">${t('total')}</div></div>
      </div>
      <details style="margin-top:14px;">
        <summary style="font-size:11px;color:#555;cursor:pointer;letter-spacing:0.04em;list-style:none;display:flex;align-items:center;gap:5px;">
          <span style="font-size:10px;color:#444;">ⓘ</span> ${t('billingNote')}
        </summary>
        <div style="font-size:12px;color:#3a3a3a;line-height:1.7;margin-top:8px;padding:10px 12px;background:#151515;border-radius:8px;border:1px solid #1e1e1e;">
          ${t('billingPolicy')}
        </div>
      </details>
    </div>

    <button class="btn-confirm" id="btn-confirm" onclick="confirmHours()">${t('confirmBtn')}</button>
    <button class="btn-dispute" onclick="toggleDispute()">${t('disputeBtn')}</button>

    <div class="dispute-form" id="dispute-form">
      <span class="dispute-section-label">${t('disputeTitle')}</span>
      <div class="type-grid">
        <button class="type-btn" id="type-Hours"    onclick="pickType('Hours')"   >${t('typeHours')}</button>
        <button class="type-btn" id="type-Position" onclick="pickType('Position')">${t('typePosition')}</button>
        <button class="type-btn" id="type-Both"     onclick="pickType('Both')"    >${t('typeBoth')}</button>
        <button class="type-btn" id="type-Other"    onclick="pickType('Other')"   >${t('typeOther')}</button>
      </div>
      <span class="dispute-section-label">${t('describeLabel')}</span>
      <textarea class="dispute-textarea" id="dispute-note" placeholder="${t('placeholder')}"></textarea>
      <button class="btn-submit-dispute" id="btn-submit-dispute" onclick="submitDispute()">${t('submitDispute')}</button>
    </div>
  `;
}

function renderState(type, msg, data) {
  const cfg = {
    confirmed: { icon:'✅', title: t('confirmedTitle'), sub: t('confirmedSub') },
    disputed:  { icon:'🚩', title: t('disputedTitle'),  sub: t('disputedSub')  },
    resolved:  { icon:'✔️', title: t('resolvedTitle'),  sub: t('resolvedSub')  },
    expired:   { icon:'⏰', title: t('expiredTitle'),   sub: t('expiredSub')   },
    already:   { icon:'✓',  title: t('alreadyTitle'),   sub: t('alreadySub')   },
    error:     { icon:'❌', title: t('errorTitle'),      sub: escH(msg) || t('errorSub') },
  };
  const c = cfg[type] || cfg.error;

  let extra = '';
  if (type === 'expired' && data) {
    extra = `<div class="expired-summary">
      <div class="exp-row"><span class="exp-lbl">${t('clockIn')}</span><span class="exp-val">${escH(data.billingIn)}</span></div>
      <div class="exp-row"><span class="exp-lbl">${t('clockOut')}</span><span class="exp-val">${escH(data.billingOut)}</span></div>
      <div class="exp-grid">
        <div class="exp-box reg"><div class="ev">${data.regHrs ?? '—'}</div><div class="el">${t('reg')}</div></div>
        <div class="exp-box ot" ><div class="ev">${data.otHrs  ?? '—'}</div><div class="el">${t('ot')}</div></div>
        <div class="exp-box tot"><div class="ev">${data.totalHrs ?? '—'}</div><div class="el">${t('total')}</div></div>
      </div>
    </div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">${c.icon}</div>
      <div class="state-title">${c.title}</div>
      <div class="state-sub">${c.sub}</div>
      ${extra}
    </div>`;
}

function toggleDispute() {
  const f = document.getElementById('dispute-form');
  if (f) f.classList.toggle('open');
}

function pickType(type) {
  selectedType = type;
  ['Hours','Position','Both','Other'].forEach(k => {
    const b = document.getElementById('type-' + k);
    if (b) b.classList.toggle('sel', k === type);
  });
}

async function confirmHours() {
  const btn = document.getElementById('btn-confirm');
  if (btn) { btn.disabled = true; btn.textContent = t('submitting'); }
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=submitSignoff&token=${encodeURIComponent(getToken())}&status=Confirmed&disputeType=&disputeNote=`);
    const data = await res.json();
    if (data.error) { alert(data.error); if (btn) { btn.disabled = false; btn.textContent = t('confirmBtn'); } return; }
    renderState('confirmed');
  } catch(e) {
    alert('Connection error. Please try again.');
    if (btn) { btn.disabled = false; btn.textContent = t('confirmBtn'); }
  }
}

async function submitDispute() {
  if (!selectedType) { alert(t('typeRequired')); return; }
  const note = document.getElementById('dispute-note');
  if (!note || !note.value.trim()) { alert(t('noteRequired')); return; }
  const btn = document.getElementById('btn-submit-dispute');
  if (btn) { btn.disabled = true; btn.textContent = t('submitting'); }
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=submitSignoff&token=${encodeURIComponent(getToken())}&status=Disputed&disputeType=${encodeURIComponent(selectedType)}&disputeNote=${encodeURIComponent(note.value.trim())}`);
    const data = await res.json();
    if (data.error) { alert(data.error); if (btn) { btn.disabled = false; btn.textContent = t('submitDispute'); } return; }
    renderState('disputed');
  } catch(e) {
    alert('Connection error. Please try again.');
    if (btn) { btn.disabled = false; btn.textContent = t('submitDispute'); }
  }
}
</script>
</body>
</html>
